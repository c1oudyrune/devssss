name: Notify Tg on Merge

on:
  pull_request:
    branches: [ dev ] 
    types: [ closed ] 

jobs:
  build_and_notify:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests 

    
      - name: Run Code Quality Check 
        id: code_quality 
        run: |
          echo "Running code quality checks..."
          # Пример: запуск SonarScanner
          # sonar-scanner \
          # -Dsonar.projectKey=your_project_key \
          # -Dsonar.organization=your_org \
          # -Dsonar.host.url=https://sonarcloud.io \
          # -Dsonar.login=${{ secrets.SONAR_TOKEN }}

          # Имитация получения отчета: создаем простой файл
          echo "Quality check finished. Generating report..."
          echo "Report Summary for branch ${{ github.event.pull_request.head.ref }}" > quality_report.txt
          echo "Merged commit: ${{ github.sha }}" >> quality_report.txt
          echo "Created at: $(date +'%Y-%m-%d %H:%M:%S')" >> quality_report.txt
          echo "----------" >> quality_report.txt
          echo "Link to PR: ${{ github.event.pull_request.html_url }}" >> quality_report.txt
          echo "Link to repository: ${{ github.server_url }}/${{ github.repository }}" >> quality_report.txt
          echo "----------" >> quality_report.txt
          echo "Quality check passed (simulated)." >> quality_report.txt

  

     
      - name: Upload report artifact
        uses: actions/upload-artifact@v3
        with:
          name: code-quality-report
          path: quality_report.txt 

      
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master 
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }} 
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }} 
          message: |
             **Pull Request Merged**

            Branch: `${{ github.event.pull_request.head.ref }}`
            Merged Commit: `${{ github.sha }}` (Link: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            Merged by: `${{ github.event.pull_request.merged_by.login }}`
            Merge Time: `${{ github.event.pull_request.merged_at }}`

             **Links:**
            * PR: ${{ github.event.pull_request.html_url }}
            * Repository: ${{ github.server_url }}/${{ github.repository }}

             **Quality Report:** (Attached as artifact)
            (Manual check of latest report will be available in artifacts of this workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            
